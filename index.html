<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>GymTracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #252525;
      --accent: #e8ff47; --accent2: #c8df30;
      --text: #ffffff; --text2: #aaaaaa;
      --red: #ff4757; --green: #2ed573; --blue: #1e90ff; --orange: #ffa502;
      --radius: 14px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; max-width: 480px; margin: 0 auto; }
    .header { background: var(--bg2); padding: 16px 20px 12px; border-bottom: 1px solid #2a2a2a; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .header h1 span { color: var(--accent); }
    .header-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg2); border-top: 1px solid #2a2a2a; display: flex; z-index: 200; }
    .nav-btn { flex: 1; padding: 10px 4px 12px; background: none; border: none; color: var(--text2); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }
    .page { display: none; padding: 16px; }
    .page.active { display: block; }
    .card { background: var(--bg2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 10px; }
    .day-badge { display: inline-block; background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .workout-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .workout-meta { font-size: 13px; color: var(--text2); }
    .warmup-box { background: #1e2a0f; border: 1px solid #3a5a10; border-radius: 10px; padding: 12px; margin: 12px 0; }
    .warmup-box .wlabel { font-size: 11px; color: #8fba30; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .warmup-box p { font-size: 13px; color: #ccc; line-height: 1.5; }
    .exercise-block { background: var(--bg3); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .ex-name { font-size: 15px; font-weight: 700; }
    .ex-type { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
    .ex-type.fuerza      { background: #ff475720; color: var(--red); }
    .ex-type.hipertrofia { background: #1e90ff20; color: var(--blue); }
    .ex-type.acabado     { background: #ffa50220; color: var(--orange); }
    .ex-type.core        { background: #2ed57320; color: var(--green); }
    .ex-type.cardio      { background: #bf5af220; color: #bf5af2; }
    .ex-type.movilidad   { background: #5ac8fa20; color: #5ac8fa; }
    .ex-type.isometrico  { background: #e8ff4720; color: var(--accent); }
    .ex-prescription { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .sets-table { width: 100%; border-collapse: collapse; }
    .sets-table th { font-size: 11px; color: var(--text2); text-align: left; padding: 0 4px 6px; font-weight: 500; }
    .sets-table td { padding: 3px 4px; }
    .set-num { width: 28px; font-size: 13px; color: var(--text2); text-align: center; font-weight: 700; }
    .set-input { background: var(--bg2); border: 1px solid #333; border-radius: 8px; color: var(--text); font-size: 15px; font-weight: 600; text-align: center; padding: 7px 4px; width: 100%; outline: none; transition: border-color 0.2s; }
    .set-input:focus { border-color: var(--accent); }
    .set-input.completed { border-color: var(--green); background: #2ed57315; }
    .set-done-btn { background: var(--bg2); border: 1px solid #333; border-radius: 8px; color: var(--text2); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.2s; }
    .set-done-btn.done { background: var(--green); border-color: var(--green); color: #000; }
    .rest-timer { text-align: center; font-size: 12px; color: var(--text2); margin-top: 8px; padding: 6px; background: var(--bg2); border-radius: 8px; }
    .rest-timer span { color: var(--accent); font-weight: 700; }
    .btn-finish { width: 100%; padding: 16px; background: var(--accent); color: #000; font-size: 16px; font-weight: 800; border: none; border-radius: var(--radius); cursor: pointer; margin-top: 16px; letter-spacing: 0.5px; transition: background 0.2s; }
    .btn-finish:hover { background: var(--accent2); }
    .btn-secondary { width: 100%; padding: 14px; background: var(--bg3); color: var(--text); font-size: 14px; font-weight: 600; border: 1px solid #333; border-radius: var(--radius); cursor: pointer; margin-top: 8px; }
    .day-selector { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
    .day-selector::-webkit-scrollbar { display: none; }
    .day-chip { flex-shrink: 0; padding: 8px 14px; background: var(--bg2); border: 1px solid #333; border-radius: 20px; font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.2s; white-space: nowrap; }
    .day-chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    .day-chip.rest { opacity: 0.4; }
    .history-item { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border: 1px solid transparent; transition: border-color 0.2s; }
    .history-item:hover { border-color: #444; }
    .history-header { display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
    .history-info { flex: 1; }
    .history-actions { display: flex; gap: 6px; }
    .history-action-btn { background: var(--bg3); border: 1px solid #333; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .history-action-btn.edit { color: var(--blue); }
    .history-action-btn.edit:hover { background: #1e90ff20; border-color: var(--blue); }
    .history-action-btn.delete { color: var(--red); }
    .history-action-btn.delete:hover { background: #ff475720; border-color: var(--red); }
    .history-date { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .history-workout { font-size: 16px; font-weight: 700; }
    .history-summary { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .history-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
    .history-detail.open { display: block; }
    .history-ex { font-size: 13px; margin-bottom: 8px; }
    .history-ex-name { font-weight: 700; margin-bottom: 3px; }
    .history-sets { display: flex; gap: 6px; flex-wrap: wrap; }
    .history-set-pill { background: var(--bg3); border-radius: 6px; padding: 3px 8px; font-size: 12px; color: var(--text2); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .big { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .exercise-picker { width: 100%; background: var(--bg2); border: 1px solid #333; color: var(--text); font-size: 14px; padding: 10px 14px; border-radius: 10px; outline: none; margin-bottom: 16px; }
    .chart-container { background: var(--bg2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .chart-canvas { max-height: 220px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-box { background: var(--bg2); border-radius: 12px; padding: 14px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .config-row { background: var(--bg2); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .config-row-label { font-size: 15px; font-weight: 600; }
    .config-row-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .config-row svg { color: var(--text2); width: 18px; height: 18px; }
    .danger-btn { width: 100%; padding: 14px; background: #ff475715; color: var(--red); font-size: 14px; font-weight: 600; border: 1px solid #ff475730; border-radius: var(--radius); cursor: pointer; margin-top: 8px; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid #444; color: var(--text); padding: 12px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: #000000cc; z-index: 400; align-items: flex-end; justify-content: center; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
    .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; }
    .modal-cancel { background: var(--bg3); color: var(--text); }
    .modal-confirm { background: var(--red); color: #fff; }
    .phase-card { border-radius: var(--radius); padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden; }
    .phase-card::before { content: ''; position: absolute; inset: 0; opacity: 0.08; }
    .phase-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; margin-bottom: 4px; }
    .phase-name { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
    .phase-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .phase-pill { background: rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
    .phase-tip { font-size: 12px; opacity: 0.85; line-height: 1.5; margin-top: 8px; }
    .phase-progress-bar { background: rgba(255,255,255,0.15); border-radius: 10px; height: 6px; margin-top: 12px; overflow: hidden; }
    .phase-progress-fill { height: 100%; border-radius: 10px; background: rgba(255,255,255,0.7); transition: width 0.5s ease; }
    .phase-progress-label { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.7; margin-top: 5px; }
    .weight-input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .weight-input-big { flex: 1; background: var(--bg3); border: 2px solid #333; border-radius: 12px; color: var(--text); font-size: 24px; font-weight: 700; text-align: center; padding: 10px; outline: none; }
    .weight-input-big:focus { border-color: var(--accent); }
    .weight-save-btn { background: var(--accent); color: #000; font-size: 14px; font-weight: 800; border: none; border-radius: 12px; padding: 14px 20px; cursor: pointer; white-space: nowrap; }
    .weight-history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; font-size: 13px; }
    .weight-history-item:last-child { border-bottom: none; }
    .weight-val { font-weight: 700; font-size: 16px; }
    .weight-delta-up { color: var(--blue); font-size: 12px; }
    .weight-delta-down { color: var(--green); font-size: 12px; }
    .weight-delta-same { color: var(--text2); font-size: 12px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    @keyframes slideFromRight { from { transform: translateX(40px); opacity: 0.5; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideFromLeft  { from { transform: translateX(-40px); opacity: 0.5; } to { transform: translateX(0); opacity: 1; } }
    .page.slide-right { animation: slideFromRight 0.2s ease-out; }
    .page.slide-left  { animation: slideFromLeft  0.2s ease-out; }
    #floatingTimer { display:none; position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--bg2); border-bottom:2px solid var(--accent); padding:8px 20px; z-index:150; display:none; align-items:center; justify-content:space-between; }
    #floatingTimer.active { display:flex; }
    #floatingTimerLabel { font-size:15px; font-weight:800; color:var(--accent); }
    #floatingTimerSub { font-size:11px; color:var(--text2); }
    #floatingTimerBtn { background:var(--red); border:none; color:#fff; padding:6px 14px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
    body.has-timer .header { padding-top:52px; }
    .autosave-badge { font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.4s; padding: 6px 0 2px; text-align: right; height: 20px; }
    .autosave-badge.show { opacity: 1; }
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .cal-nav-btn { background: var(--bg3); border: 1px solid #333; color: var(--text); padding: 7px 16px; border-radius: 10px; cursor: pointer; font-size: 20px; font-weight: 700; line-height: 1; }
    .cal-month-label { font-size: 16px; font-weight: 800; text-transform: capitalize; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-header-cell { text-align: center; font-size: 10px; color: var(--text2); padding: 6px 0 4px; font-weight: 600; }
    .cal-cell { background: var(--bg3); border-radius: 8px; padding: 5px 3px 4px; min-height: 52px; cursor: pointer; border: 1px solid transparent; display: flex; flex-direction: column; align-items: center; transition: background 0.15s; }
    .cal-cell:hover:not(.cal-empty) { background: #2a2a2a; }
    .cal-cell.cal-today { border-color: var(--accent)80; }
    .cal-cell.cal-selected { background: #e8ff4718; border-color: var(--accent); }
    .cal-cell.cal-empty { background: transparent; border-color: transparent; cursor: default; }
    .cal-cell.cal-other-month { opacity: 0.35; }
    .cal-day-num { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 2px; line-height: 1; }
    .cal-cell.cal-today .cal-day-num { color: var(--accent); }
    .cal-dot { width: 7px; height: 7px; border-radius: 50%; margin: 1px 0; flex-shrink: 0; }
    .cal-more { font-size: 8px; color: var(--text2); margin-top: 1px; }
    .cal-detail-session { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border-left: 3px solid; }
  </style>
</head>
<body>
<div id="floatingTimer">
  <div><div id="floatingTimerLabel">⏳ 0:00</div><div id="floatingTimerSub">Descanso activo</div></div>
  <button id="floatingTimerBtn" onclick="goPage('Hoy')">Ver →</button>
</div>
<div class="header">
  <h1>Gym<span>Tracker</span></h1>
  <div class="header-sub" id="headerSub">Cargando...</div>
</div>
<div id="pageHoy" class="page active"></div>
<div id="pageHistorial" class="page"></div>
<div id="pageProgreso" class="page"></div>
<div id="pageConfig" class="page"></div>
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goPage('Hoy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Hoy
  </button>
  <button class="nav-btn" onclick="goPage('Historial')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Historial
  </button>
  <button class="nav-btn" onclick="goPage('Progreso')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progreso
  </button>
  <button class="nav-btn" onclick="goPage('Config')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>Config
  </button>
</nav>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">¿Estás seguro?</h3>
    <p id="modalMsg">Esta acción no se puede deshacer.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-confirm" id="modalConfirmBtn">Confirmar</button>
    </div>
  </div>
</div>
<div id="pageEditSession" style="display:none;position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto">
  <div id="editSessionContent"></div>
</div>

    });

  } catch(e) { return DEFAULT_PLAN; }

// Sistema de almacenamiento local (PWA - sin servidor)
const STORAGE_KEY = 'gymtracker_data';
let dataCache = null;

function getData() {
  if (dataCache) return dataCache;

  // Cargar desde localStorage
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      const data = JSON.parse(stored);
      if(!data.sessions) data.sessions = [];
      if(!data.weights) data.weights = [];
      dataCache = data;
      return data;
    }
  } catch(e) {
    console.error('Error cargando datos:', e);
  }

  // Datos por defecto
  const defaultData = {sessions: [], weights: []};
  dataCache = defaultData;
  return defaultData;
}

function saveData(d, silent) {
  dataCache = d;

  // Guardar en localStorage
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    autoBackupToFolder(true);
    return true;
  } catch(e) {
    console.error('Error guardando datos:', e);
    if(!silent) {
      showToast('⚠️ Error al guardar', '');
    }
    return false;
  }
}

// --- Auto-backup to folder (File System Access API) ---
let backupDirHandle = null;

function getBackupDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('gymBackupDB', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
  });
}

async function saveBackupHandle(handle) {
  try {
    const db = await getBackupDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'backupDir');
  } catch(e) {}
}

async function loadBackupHandle() {
  try {
    const db = await getBackupDB();
    return new Promise(resolve => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('backupDir');
      req.onsuccess = e => resolve(e.target.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

async function initBackupDir() {
  backupDirHandle = await loadBackupHandle();
  if (backupDirHandle) {
    try {
      const perm = await backupDirHandle.queryPermission({ mode: 'readwrite' });
      if (perm !== 'granted') backupDirHandle = null;
    } catch(e) { backupDirHandle = null; }
  }
}

async function selectBackupFolder() {
  if (!('showDirectoryPicker' in window)) {
    showToast('Tu navegador no soporta esta función', '');
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
    backupDirHandle = handle;
    await saveBackupHandle(handle);
    showToast('📁 Carpeta configurada', 'success');
    await autoBackupToFolder(false);
    renderConfig();
  } catch(e) {
    if (e.name !== 'AbortError') showToast('Error al seleccionar carpeta', '');
  }
}

async function autoBackupToFolder(silent) {
  if (!backupDirHandle) return;
  try {
    let perm = await backupDirHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') perm = await backupDirHandle.requestPermission({ mode: 'readwrite' });
    if (perm !== 'granted') return;
    const data = getData();
    const json = JSON.stringify(data, null, 2);

    // Archivo con fecha (historial)
    const dated = await backupDirHandle.getFileHandle(`gymtracker_${formatDate(new Date())}.json`, { create: true });
    const w1 = await dated.createWritable(); await w1.write(json); await w1.close();

    // Archivo fijo "latest" — siempre actualizado, fácil de importar
    const latest = await backupDirHandle.getFileHandle('gymtracker_latest.json', { create: true });
    const w2 = await latest.createWritable(); await w2.write(json); await w2.close();

    if (!silent) showToast('💾 Backup guardado', 'success');
  } catch(e) {
    console.warn('Auto-backup failed:', e);
  }
}

function playBeep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,0.25,0.5].forEach(delay=>{const osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type='sine';osc.frequency.value=delay===0.5?1046:880;gain.gain.setValueAtTime(0.6,ctx.currentTime+delay);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.18);osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+0.2);});}catch(e){}}
let restTimerState=null; // {secs,dow,exIdx,endTime,pausedRemaining,running,done}
let restRafId=null, restLastSec=-1;
function restRemaining(){
  if(!restTimerState)return 0;
  if(!restTimerState.running)return restTimerState.pausedRemaining||0;
  return Math.max(0,Math.ceil((restTimerState.endTime-Date.now())/1000));
}
function saveRestState(){try{if(restTimerState)localStorage.setItem('restTimerState',JSON.stringify(restTimerState));else localStorage.removeItem('restTimerState');}catch(e){}}
function restRAF(){
  if(!restTimerState||!restTimerState.running){restRafId=null;return;}
  const rem=restRemaining();
  // solo redibujar cuando cambia el segundo
  if(rem!==restLastSec){
    restLastSec=rem;
    updateRestTimerUI();
    if(rem<=0){
      restTimerState.running=false;restTimerState.done=true;
      saveRestState();updateRestTimerUI();
      showToast('⏰ ¡Descanso terminado!','success');playBeep();
      if(navigator.vibrate)navigator.vibrate([300,100,300,100,500]);
      restRafId=null;return;
    }
    saveRestState();
  }
  restRafId=requestAnimationFrame(restRAF);
}
function startRest(secs,dow,exIdx){
  if(restRafId){cancelAnimationFrame(restRafId);restRafId=null;}
  const exName=PLAN[dow]&&PLAN[dow].exercises[exIdx]?PLAN[dow].exercises[exIdx].name:'';
  restTimerState={secs,dow,exIdx,exName,endTime:Date.now()+secs*1000,pausedRemaining:secs,running:true,done:false};
  restLastSec=-1;
  saveRestState();updateRestTimerUI();
  restRafId=requestAnimationFrame(restRAF);
}
function stopRest(){
  if(restRafId){cancelAnimationFrame(restRafId);restRafId=null;}
  if(restTimerState){restTimerState.running=false;restTimerState.pausedRemaining=restRemaining();}
  saveRestState();updateRestTimerUI();
}
function resumeRest(){
  if(!restTimerState||restTimerState.running)return;
  restTimerState.endTime=Date.now()+restTimerState.pausedRemaining*1000;
  restTimerState.running=true;restLastSec=-1;
  saveRestState();updateRestTimerUI();
  restRafId=requestAnimationFrame(restRAF);
}
function updateRestTimerUI(){
  if(!restTimerState)return;
  const{secs,dow,exIdx,running,done}=restTimerState;
  const rem=restRemaining();
  // Actualizar widget flotante (visible en todas las pestañas)
  const ft=document.getElementById('floatingTimer');
  const fl=document.getElementById('floatingTimerLabel');
  const fsub=document.getElementById('floatingTimerSub');
  if(ft&&fl){
    if(running&&rem>0){
      ft.classList.add('active');document.body.classList.add('has-timer');
      fl.textContent=`⏳ ${formatRest(rem)}`;
      const exName=restTimerState.exName||(PLAN[dow]&&PLAN[dow].exercises[exIdx]?PLAN[dow].exercises[exIdx].name:'');
      if(fsub)fsub.textContent=exName||'Descanso activo';
    }else{
      ft.classList.remove('active');document.body.classList.remove('has-timer');
    }
  }
  // Actualizar botones del ejercicio (solo si están en el DOM)
  const lbl=document.getElementById(`timerLabel_${dow}_${exIdx}`);
  const btn=document.getElementById(`timerBtn_${dow}_${exIdx}`);
  if(!lbl||!btn)return;
  btn.style.padding='10px 16px';btn.style.minHeight='44px';
  if(done){
    lbl.innerHTML=`<b style="color:var(--green)">✅ ¡Listo!</b>`;
    btn.textContent='⏱ Iniciar';btn.style.background='var(--accent)';btn.style.color='#000';
    btn.onclick=(e)=>{e.stopPropagation();startRest(secs,dow,exIdx);};
  }else if(running){
    lbl.innerHTML=`⏳ <b style="color:var(--accent);font-size:16px">${formatRest(rem)}</b>`;
    btn.textContent='⏹ Parar';btn.style.background='var(--red)';btn.style.color='#fff';
    btn.onclick=(e)=>{e.stopPropagation();stopRest();};
  }else{
    lbl.innerHTML=`⏳ <b style="color:var(--accent);font-size:16px">${formatRest(rem)}</b>`;
    btn.textContent='▶ Continuar';btn.style.background='var(--accent)';btn.style.color='#000';
    btn.onclick=(e)=>{e.stopPropagation();resumeRest();};
  }
}

async function generateAIPlan() {
  const apiKey = (localStorage.getItem('gymtracker_apikey') || '').trim();
  const prompt = (document.getElementById('aiPromptInput')?.value || '').trim();
  if (!apiKey) { showToast('Introduce tu API key de Anthropic', ''); return; }
  if (!prompt) { showToast('Describe tu entrenamiento primero', ''); return; }

  const btn = document.getElementById('generateBtn');
  btn.textContent = '⏳ Generando...'; btn.disabled = true;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 4000,
        system: AI_SYSTEM_PROMPT,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Error ${res.status}`);
    }

    const data = await res.json();
    const text = data.content[0].text.trim();
    const jsonStart = text.indexOf('{'), jsonEnd = text.lastIndexOf('}');
    if (jsonStart === -1) throw new Error('Respuesta no válida');
    const planJson = JSON.parse(text.slice(jsonStart, jsonEnd + 1));

    if (!planJson[1] || !planJson[1].exercises) throw new Error('Plan incompleto');

    PLAN = planJson;
    localStorage.setItem('gymtracker_plan', JSON.stringify(PLAN));
    invalidateHoy(); hoyRenderedDow = null;
    showToast('✅ Plan generado correctamente', 'success');
    renderConfig();
  } catch(e) {
    showToast('❌ ' + (e.message || 'Error al generar'), '');
  } finally {
    if (btn) { btn.textContent = '✨ Generar plan'; btn.disabled = false; }
  }
}

function importData(){document.getElementById('importFile').click();}
function handleImport(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);if(!d.sessions)throw new Error('inválido');saveData(d);invalidateHoy();showToast('✅ Datos importados: '+d.sessions.length+' sesiones','success');renderConfig();}catch(err){showToast('❌ Archivo inválido','');}};reader.readAsText(file);}
function confirmClear(){document.getElementById('modalTitle').textContent='¿Borrar todos los datos?';document.getElementById('modalMsg').textContent='Se eliminarán todas las sesiones y registros de peso. Esta acción no se puede deshacer.';document.getElementById('modalConfirmBtn').textContent='Borrar todo';document.getElementById('modalConfirmBtn').onclick=()=>{saveData({sessions:[],weights:[]});closeModal();showToast('🗑 Datos eliminados');renderConfig();};document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  const btn=document.getElementById('modalConfirmBtn');
  btn.style.background='';btn.style.color='';
}
function formatDate(d){return d.toISOString().slice(0,10);}
function formatDateLong(d){return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});}
function formatDateLong2(str){const d=new Date(str+'T12:00:00');return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});}
function formatDateShort(str){const d=new Date(str+'T12:00:00');return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});}
function formatRest(secs){if(secs>=60)return Math.floor(secs/60)+':'+String(secs%60).padStart(2,'0')+' min';return secs+' seg';}
let toastTimeout;
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');clearTimeout(toastTimeout);toastTimeout=setTimeout(()=>{t.className='toast';},2500);}
try{const t=localStorage.getItem('gymtracker_temp');if(t)tempSession=JSON.parse(t);}catch(e){}
// Restaurar timer de localStorage si había uno activo
try{
  const ts=localStorage.getItem('restTimerState');
  if(ts){
    restTimerState=JSON.parse(ts);
    if(restTimerState&&restTimerState.running){
      // Reactivar interval si aún no ha terminado
      if(restRemaining()>0){restLastSec=-1;restRafId=requestAnimationFrame(restRAF);}
      else{restTimerState.running=false;restTimerState.done=true;}
    }
  }
}catch(e){}
const savedPage=localStorage.getItem('gymtracker_currentPage')||'Hoy';
migrateSessionDows();
goPage(savedPage);
initBackupDir();

function migrateSessionDows(){
  if(localStorage.getItem('gymtracker_dow_migrated_v4'))return;
  // Construir mapa label→dow del plan por defecto actual
  const labelToDow={};
  Object.entries(DEFAULT_PLAN).forEach(([dow,plan])=>{if(plan.label)labelToDow[plan.label]=parseInt(dow);});
  const data=getData();
  let changed=false;
  data.sessions.forEach(s=>{
    const newDow=labelToDow[s.label];
    if(newDow!==undefined&&newDow!==s.dow){s.dow=newDow;changed=true;}
  });
  if(changed){saveData(data,true);invalidateHoy();}
  localStorage.setItem('gymtracker_dow_migrated_v4','1');
}

// Swipe para cambiar de pestaña
(function(){
  let sx=0,sy=0,st=0;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;
    const vel=Math.abs(dx)/dt; // px/ms
    const lowerHalf=sy>window.innerHeight*0.5;
    if(lowerHalf&&dt<300&&vel>0.5&&Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)*1.5){
      const idx=PAGES_ORDER.indexOf(currentPage);
      if(dx<0&&idx<PAGES_ORDER.length-1)goPage(PAGES_ORDER[idx+1],'right');
      else if(dx>0&&idx>0)goPage(PAGES_ORDER[idx-1],'left');
    }
  },{passive:true});
})();

// Registrar Service Worker para PWA
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg=>console.log('Service Worker registrado'))
      .catch(err=>console.log('Error Service Worker:',err));
  });
}
